<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Trắc Nghiệm Vi Xử Lý - 145 Câu Hỏi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            font-size: 16px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: #eee;
            border-radius: 10px;
            margin: 0 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .score {
            color: #667eea;
            font-weight: bold;
            font-size: 16px;
        }

        .question-text {
            font-size: 18px;
            color: #333;
            margin: 25px 0 20px 0;
            line-height: 1.6;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 14px;
            text-align: center;
        }

        .option:hover:not(.disabled) {
            border-color: #667eea;
            background: #f5f5ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .option.correct {
            border-color: #4caf50;
            background: #4caf50;
            color: white;
        }

        .option.incorrect {
            border-color: #f44336;
            background: #f44336;
            color: white;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #4caf50;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #f44336;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            flex: 1;
            max-width: 200px;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-restart {
            background: #667eea;
            color: white;
            flex: 1;
            max-width: 200px;
        }

        .btn-restart:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .results-container {
            text-align: center;
            padding: 40px 20px;
        }

        .results-container h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
        }

        .results-details {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            line-height: 2;
        }

        .results-details p {
            margin: 10px 0;
            color: #666;
        }

        .hidden {
            display: none;
        }

        .answer-review {
            margin-top: 30px;
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .answer-item {
            margin: 15px 0;
            padding: 15px;
            background: white;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }

        .answer-item.wrong {
            border-left-color: #f44336;
        }

        .answer-item.correct {
            border-left-color: #4caf50;
        }

        .answer-item-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .answer-item-content {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .quiz-info {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .progress-bar {
                margin: 10px 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Quiz Section -->
        <div id="quiz-section">
            <div class="header">
                <h1>📚 Bộ Trắc Nghiệm Vi Xử Lý</h1>
                <p>145 câu hỏi - Phản hồi tức thì - Kiểm tra kiến thức của bạn</p>
            </div>

            <div class="quiz-info">
                <span class="question-number" id="question-num">Câu 1/145</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="score" id="current-score">Đúng: 0</span>
            </div>

            <div class="question-text" id="question-text"></div>

            <div class="options-container" id="options-container"></div>

            <div class="feedback" id="feedback"></div>

            <div class="button-group">
                <button class="btn-next" id="next-btn" onclick="nextQuestion()" disabled>Tiếp theo →</button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results-section" class="hidden">
            <div class="results-container">
                <h2>🎉 Kết Quả Cuối Cùng</h2>
                <div class="score-display" id="final-score"></div>
                <div class="results-details">
                    <p><strong>Tổng câu hỏi:</strong> <span id="total-questions">145</span></p>
                    <p><strong>Câu trả lời đúng:</strong> <span id="correct-answers">0</span></p>
                    <p><strong>Câu trả lời sai:</strong> <span id="wrong-answers">0</span></p>
                    <p><strong>Phần trăm:</strong> <span id="percentage">0</span>%</p>
                </div>

                <div class="answer-review" id="answer-review"></div>

                <button class="btn-restart" onclick="restartQuiz()">🔄 Làm lại bài kiểm tra</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentQuestion = 0;
        let userAnswers = [];
        let score = 0;
        let answerSubmitted = false;

        async function loadQuizData() {
            try {
                const response = await fetch('complete_quiz_145_questions.json');
                quizData = await response.json();
                renderQuiz();
            } catch (error) {
                console.error('Lỗi khi tải dữ liệu:', error);
                alert('Không thể tải dữ liệu bài kiểm tra. Vui lòng tải lại trang.');
            }
        }

        function renderQuiz() {
            const question = quizData[currentQuestion];
            document.getElementById('question-num').textContent = `Câu ${currentQuestion + 1}/145`;
            document.getElementById('question-text').textContent = question.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionBtn = document.createElement('button');
                optionBtn.className = 'option';
                optionBtn.textContent = option;
                optionBtn.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(optionBtn);
            });

            // Update progress bar
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';

            // Reset feedback
            answerSubmitted = false;
            document.getElementById('feedback').classList.remove('show');
            document.getElementById('next-btn').disabled = true;
        }

        function selectAnswer(index) {
            if (answerSubmitted) return;

            const question = quizData[currentQuestion];
            const options = document.querySelectorAll('.option');
            
            // Disable all options
            options.forEach(opt => opt.classList.add('disabled'));

            // Mark user's selection
            options[index].classList.add('selected');

            // Check if correct
            const isCorrect = index === question.correctAnswer;
            userAnswers.push({
                questionIndex: currentQuestion,
                userAnswer: index,
                correctAnswer: question.correctAnswer,
                isCorrect: isCorrect,
                question: question.question,
                userChoose: question.options[index],
                correctOption: question.options[question.correctAnswer]
            });

            // Show correct/incorrect
            if (isCorrect) {
                options[index].classList.remove('selected');
                options[index].classList.add('correct');
                score++;
            } else {
                options[index].classList.remove('selected');
                options[index].classList.add('incorrect');
                // Show correct answer
                options[question.correctAnswer].classList.add('correct');
            }

            // Update score
            document.getElementById('current-score').textContent = `Đúng: ${score}`;

            // Show feedback
            const feedback = document.getElementById('feedback');
            if (isCorrect) {
                feedback.textContent = '✓ Chính xác!';
                feedback.classList.add('correct');
            } else {
                feedback.textContent = '✗ Sai rồi! Đáp án đúng là: ' + question.options[question.correctAnswer];
                feedback.classList.add('incorrect');
            }
            feedback.classList.add('show');

            // Enable next button
            document.getElementById('next-btn').disabled = false;
            answerSubmitted = true;
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                renderQuiz();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');

            const percentage = (score / quizData.length) * 100;
            document.getElementById('final-score').textContent = `${score}/${quizData.length}`;
            document.getElementById('correct-answers').textContent = score;
            document.getElementById('wrong-answers').textContent = quizData.length - score;
            document.getElementById('percentage').textContent = percentage.toFixed(1);

            // Show answer review
            const reviewContainer = document.getElementById('answer-review');
            reviewContainer.innerHTML = '<h3 style="margin-bottom: 20px; color: #333;">Xem lại các câu trả lời:</h3>';

            userAnswers.forEach(answer => {
                const reviewItem = document.createElement('div');
                reviewItem.className = 'answer-item ' + (answer.isCorrect ? 'correct' : 'wrong');
                reviewItem.innerHTML = `
                    <div class="answer-item-title">
                        ${answer.isCorrect ? '✓' : '✗'} Câu ${answer.questionIndex + 1}
                    </div>
                    <div class="answer-item-content">
                        <div><strong>Câu hỏi:</strong> ${answer.question}</div>
                        <div><strong>Bạn chọn:</strong> ${answer.userChoose}</div>
                        ${!answer.isCorrect ? `<div><strong>Đáp án đúng:</strong> ${answer.correctOption}</div>` : ''}
                    </div>
                `;
                reviewContainer.appendChild(reviewItem);
            });
        }

        function restartQuiz() {
            currentQuestion = 0;
            userAnswers = [];
            score = 0;
            answerSubmitted = false;
            document.getElementById('quiz-section').classList.remove('hidden');
            document.getElementById('results-section').classList.add('hidden');
            document.getElementById('current-score').textContent = 'Đúng: 0';
            renderQuiz();
        }

        // Load quiz when page loads
        window.addEventListener('DOMContentLoaded', loadQuizData);
    </script>
</body>
</html>
